<script>
let tarifaUsuario = 0.85;
let totalKwhGeral = 0;
let totalCustoGeral = 0;

function autenticarUsuario() {

    const nome = document.getElementById('user-name').value;
    const cpf = document.getElementById('user-cpf').value;
    const celular = document.getElementById('user-phone').value;
    const email = document.getElementById('user-email').value;

    if (!nome || !cpf || !celular || !email) {
        alert("Preencha todos os campos.");
        return;
    }

    document.getElementById('welcome-message').innerText =
        "OPERADOR: " + nome.toUpperCase();

    document.getElementById('section-auth').classList.remove('active');

    document.getElementById('section-dashboard').classList.add('active');
}

function desautenticarUsuario() {

    document.getElementById('section-dashboard').classList.remove('active');

    document.getElementById('section-auth').classList.add('active');
}

function carregarPreset(nome, potencia, horas) {

    document.getElementById('aparelho').value = nome;
    document.getElementById('potencia').value = potencia;
    document.getElementById('horas').value = horas;
    document.getElementById('dias').value = 30;
}

function adicionarDispositivo() {

    const aparelho = document.getElementById('aparelho').value;
    const potencia = parseFloat(document.getElementById('potencia').value);
    const horas = parseFloat(document.getElementById('horas').value);
    const dias = parseFloat(document.getElementById('dias').value);

    if (!aparelho || isNaN(potencia) || isNaN(horas) || isNaN(dias)) {
        alert("Preencha os dados corretamente.");
        return;
    }

    const consumoKwh = (potencia * horas * dias) / 1000;
    const custoTotal = consumoKwh * tarifaUsuario;

    document.getElementById('res-nome').innerText =
        aparelho.toUpperCase();

    document.getElementById('res-kwh').innerText =
        consumoKwh.toFixed(2) + " kWh";

    const insightDiv = document.getElementById('insight-alerta');

    if (custoTotal > 40) {

        insightDiv.className = "insight-box insight-high";
        insightDiv.innerText =
            "ALERTA: Alto índice de consumo detectado.";

    } else {

        insightDiv.className = "insight-box insight-low";
        insightDiv.innerText =
            "ESTÁVEL: Consumo dentro do esperado.";
    }

    document.getElementById('resultado-imediato').style.display = "block";

    const tabela = document.getElementById('lista-corpo');

    const linha = document.createElement('tr');

    linha.dataset.kwh = consumoKwh;
    linha.dataset.custo = custoTotal;

    linha.innerHTML = `
        <td>${aparelho}</td>
        <td>${potencia} W</td>
        <td>${horas}h/dia</td>
        <td style="color: var(--neon-blue);">
            ${consumoKwh.toFixed(2)} kWh
        </td>
        <td style="color: var(--neon-green); font-weight: bold;">
            R$ ${custoTotal.toFixed(2).replace('.', ',')}
        </td>
        <td style="text-align:center;">
            <button class="btn-delete-row"
                onclick="removerDispositivo(this)">
                🗑️
            </button>
        </td>
    `;

    tabela.appendChild(linha);

    totalKwhGeral += consumoKwh;
    totalCustoGeral += custoTotal;

    atualizarTotaisTela();

    document.getElementById('aparelho').value = '';
    document.getElementById('potencia').value = '';
    document.getElementById('horas').value = '';
}

function removerDispositivo(botao) {

    const linha = botao.parentElement.parentElement;

    totalKwhGeral -= parseFloat(linha.dataset.kwh);
    totalCustoGeral -= parseFloat(linha.dataset.custo);

    linha.remove();

    atualizarTotaisTela();
}

function limparTodaLista() {

    if (confirm("Deseja limpar todos os dispositivos?")) {

        document.getElementById('lista-corpo').innerHTML = '';

        totalKwhGeral = 0;
        totalCustoGeral = 0;

        atualizarTotaisTela();

        document.getElementById('resultado-imediato').style.display = "none";
    }
}

function atualizarTotaisTela() {

    document.getElementById('total-kwh-geral').innerText =
        totalKwhGeral.toFixed(2) + " kWh";

    document.getElementById('total-custo-geral').innerText =
        "R$ " + totalCustoGeral.toFixed(2).replace('.', ',');
}
</script>
