<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Consumo de Energia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #219150; }
        .resultado { margin-top: 20px; padding: 15px; background-color: #e8f8f5; border-left: 5px solid #27ae60; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Simulador de Consumo</h1>
    <p>Preencha os dados do eletrodoméstico para calcular o impacto na sua conta de luz.</p>
    
    <div class="form-group">
        <label for="aparelho">Nome do Aparelho/Móvel:</label>
        <input type="text" id="aparelho" placeholder="Ex: Ar Condicionado, Geladeira">
    </div>

    <div class="form-group">
        <label for="potencia">Potência (em Watts):</label>
        <input type="number" id="potencia" placeholder="Ex: 1500">
    </div>

    <div class="form-group">
        <label for="horas">Horas de uso por dia:</label>
        <input type="number" id="horas" placeholder="Ex: 8">
    </div>

    <div class="form-group">
        <label for="dias">Dias de uso no mês:</label>
        <input type="number" id="dias" value="30">
    </div>

    <button onclick="calcularConsumo()">Calcular Gasto Estimado</button>

    <div id="resultado" class="resultado"></div>
</div>

<script>
    function calcularConsumo() {
        const aparelho = document.getElementById('aparelho').value;
        const potencia = parseFloat(document.getElementById('potencia').value);
        const horas = parseFloat(document.getElementById('horas').value);
        const dias = parseFloat(document.getElementById('dias').value);
        
        if(!aparelho || !potencia || !horas || !dias) {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        // Fórmula padrão de consumo: (Potência em Watts * Horas * Dias) / 1000
        const consumoKwh = (potencia * horas * dias) / 1000;
        
        // Tarifa média estimada de energia (ajustável)
        const valorTarifa = 0.85; 
        const custoTotal = consumoKwh * valorTarifa;

        const resultadoDiv = document.getElementById('resultado');
        resultadoDiv.style.display = 'block';
        resultadoDiv.innerHTML = `
            <strong>Resultado para: ${aparelho}</strong><br>
            Consumo mensal: ${consumoKwh.toFixed(2)} kWh<br>
            Custo estimado no mês: <strong>R$ ${custoTotal.toFixed(2)}</strong><br>
            <small>*Considerando tarifa estimada de R$ 0,85 por kWh.</small>
        `;
    }
</script>

</body>
</html>
